name: Build & Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20.x"
  API_PROJECT: ModelVault.Api/ModelVault.Api.csproj
  FRONTEND_DIR: modelvault-frontend
  PUBLISH_DIR: publish

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
        run: npm run build

      # Copy Vite output into API wwwroot so .NET serves the SPA
      - name: Copy frontend dist → API wwwroot
        run: |
          New-Item -ItemType Directory -Force -Path ModelVault.Api/wwwroot | Out-Null
          Copy-Item -Recurse -Force ${{ env.FRONTEND_DIR }}/dist/* ModelVault.Api/wwwroot/
        shell: pwsh

      # ── Backend ───────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} -c Release -o ${{ env.PUBLISH_DIR }} --no-self-contained

      # ── Deploy ────────────────────────────────────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
